<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Product preview card component</title>
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="card">
    <!-- Mobile image (inside card, shown only on mobile) -->
    <img src="./images/image-product-mobile.jpg" alt="Perfume" class="imgMobile">

    <!-- Desktop image (inside card, shown only on desktop) -->
    <img src="./images/image-product-desktop.jpg" alt="Perfume" class="imgDesktop">

    <div class="cardDesktop">
      <div class="category">Perfume</div>
      <div class="product">
        <h1>Gabrielle Essence Eau De Parfum</h1>
      </div>
      <div class="desc">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
      Perfumer-Creator for the House of CHANEL.</div>
      <div class="price">
        <span class="discount">$149.99</span>
        <span class="actual">$169.99</span>
      </div>
      <button class="cart">
        <img src="./images/icon-cart.svg" alt="" class="icon">Add to Cart
      </button>
    </div>
  </div>
</body>
</html>
